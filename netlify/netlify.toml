# Netlify configuration for Match Made In Class prototype.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  # Bundle the seeded cohort alongside the match function.
  included_files = ["netlify/functions/seeded_cohort.json"]
  node_bundler = "esbuild"

[dev]
  # `netlify dev` serves both the static frontend and functions locally.
  port = 8888
  publish = "."
